theme = "moss"

[editor]
line-number = "absolute"
mouse = true
default-yank-register = "+"
end-of-line-diagnostics = "hint"
auto-completion = true
auto-format = false
trim-trailing-whitespace = true

[editor.auto-save]
focus-lost = true

[editor.auto-save.after-delay]
enable = true
timeout = 1000

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.gutters]
layout = ["diagnostics", "spacer", "line-numbers", "spacer"]

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator", "read-only-indicator"]
right = ["diagnostics", "workspace-diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
diagnostics = ["warning", "error"]
workspace-diagnostics = ["warning", "error"]

[editor.inline-diagnostics]
cursor-line = "warning"
