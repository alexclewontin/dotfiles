# Moss — eza theme
# Requires eza >= 0.18 with theme.yml support.
# Install:  cp theme.yml ~/.config/eza/theme.yml
# (Older eza: source eza-colors.sh instead — exports EZA_COLORS.)
colourful: true

filekinds:
  normal: {foreground: "#a0b7a8"}
  directory: {foreground: "#5fb6c9", is_bold: true}
  symlink: {foreground: "#5fc9c0"}
  pipe: {foreground: "#d9c45f"}
  block_device: {foreground: "#d9c45f"}
  char_device: {foreground: "#d9c45f"}
  socket: {foreground: "#b48fd9"}
  special: {foreground: "#b48fd9"}
  executable: {foreground: "#52dc9c", is_bold: true}
  mount_point: {foreground: "#5fc9c0"}

perms:
  user_read: {foreground: "#d9c45f"}
  user_write: {foreground: "#e26a5f"}
  user_execute_file: {foreground: "#52dc9c", is_bold: true}
  user_execute_other: {foreground: "#52dc9c"}
  group_read: {foreground: "#a0b7a8"}
  group_write: {foreground: "#e26a5f"}
  group_execute: {foreground: "#52dc9c"}
  other_read: {foreground: "#647a6b"}
  other_write: {foreground: "#e26a5f"}
  other_execute: {foreground: "#52dc9c"}
  special_user_file: {foreground: "#b48fd9"}
  special_other: {foreground: "#647a6b"}
  attribute: {foreground: "#647a6b"}

size:
  major: {foreground: "#a0b7a8"}
  minor: {foreground: "#5fc9c0"}
  number_byte: {foreground: "#e7f2ea"}
  number_kilo: {foreground: "#52dc9c"}
  number_mega: {foreground: "#5fb6c9"}
  number_giga: {foreground: "#b48fd9"}
  number_huge: {foreground: "#b48fd9"}
  unit_byte: {foreground: "#a0b7a8"}
  unit_kilo: {foreground: "#52dc9c"}
  unit_mega: {foreground: "#5fb6c9"}
  unit_giga: {foreground: "#b48fd9"}
  unit_huge: {foreground: "#b48fd9"}

users:
  user_you: {foreground: "#52dc9c", is_bold: true}
  user_other: {foreground: "#647a6b"}
  user_root: {foreground: "#e26a5f"}
  group_yours: {foreground: "#a0b7a8"}
  group_other: {foreground: "#647a6b"}
  group_root: {foreground: "#e26a5f"}

links:
  normal: {foreground: "#5fc9c0"}
  multi_link_file: {foreground: "#d9c45f"}

git:
  new: {foreground: "#52dc9c"}
  modified: {foreground: "#d9c45f"}
  deleted: {foreground: "#e26a5f"}
  renamed: {foreground: "#b48fd9"}
  typechange: {foreground: "#d9c45f"}
  ignored: {foreground: "#647a6b"}
  conflicted: {foreground: "#e26a5f"}

git_repo:
  branch_main: {foreground: "#52dc9c"}
  branch_other: {foreground: "#d9c45f"}
  git_clean: {foreground: "#52dc9c"}
  git_dirty: {foreground: "#d9c45f"}

punctuation: {foreground: "#21372a"}
date: {foreground: "#647a6b"}
inode: {foreground: "#647a6b"}
blocks: {foreground: "#647a6b"}
header: {foreground: "#a0b7a8", is_bold: true}
symlink_path: {foreground: "#5fc9c0"}
control_char: {foreground: "#e26a5f"}
broken_symlink: {foreground: "#e26a5f"}
broken_path_overlay: {foreground: "#e26a5f"}
